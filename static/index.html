<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Nhận xét Đảng viên | ĐHBK Hà Nội</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header-banner {
            background-color: #b91c1c; /* Đỏ cờ */
            color: #ffffff;
            padding: 30px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }
        .header-banner h2 {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.8rem;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.08);
        }
        .card-header {
            background-color: #ffffff;
            border-bottom: 2px solid #f8f9fa;
            padding: 20px 25px;
            border-radius: 12px 12px 0 0 !important;
        }
        .btn-danger {
            background-color: #b91c1c;
            border-color: #b91c1c;
            padding: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-danger:hover {
            background-color: #991b1b;
            border-color: #991b1b;
        }
        .form-label {
            font-weight: 600;
            color: #374151;
        }
        .file-upload-wrapper {
            border: 2px dashed #cbd5e1;
            padding: 30px;
            text-align: center;
            border-radius: 8px;
            background-color: #f8fafc;
            transition: all 0.3s ease;
        }
        .file-upload-wrapper:hover {
            border-color: #b91c1c;
            background-color: #fef2f2;
        }
        #loadingSpinner {
            display: none;
        }
        .footer {
            margin-top: 50px;
            color: #6b7280;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="header-banner text-center">
        <div class="container">
            <h2>Hệ thống Tự động hóa Biểu mẫu Cấp ủy</h2>
            <p class="mb-0 fs-5 opacity-75">Hỗ trợ kết xuất bản nhận xét Đảng viên dự bị / Xét kết nạp Đảng</p>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0 text-danger"><i class="bi bi-file-earmark-excel me-2"></i>Khu vực xử lý Dữ liệu</h5>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        
                        <div class="alert alert-info border-0 bg-info bg-opacity-10 text-dark mb-4">
                            <i class="bi bi-info-circle-fill me-2 text-info"></i>
                            <strong>Hướng dẫn:</strong> Vui lòng sử dụng file Excel danh sách đúng định dạng (có các cột: TT, Họ tên, Chi đoàn, Điểm rèn luyện, TB 2 kỳ gần nhất...).
                        </div>

                        <form id="uploadForm">
                            <div class="mb-4">
                                <label class="form-label mb-3">Tải lên File Danh sách (Định dạng .xlsx)</label>
                                <div class="file-upload-wrapper">
                                    <i class="bi bi-cloud-arrow-up display-4 text-secondary mb-3"></i>
                                    <input class="form-control form-control-lg" type="file" id="excelFile" accept=".xlsx" required>
                                </div>
                            </div>
                            
                            <div class="d-grid mt-5">
                                <button type="submit" class="btn btn-danger btn-lg rounded-3" id="submitBtn">
                                    <span id="btnText"><i class="bi bi-gear-fill me-2"></i>Xử lý & Kết xuất File Word</span>
                                    <div class="spinner-border spinner-border-sm text-light ms-2" role="status" id="loadingSpinner">
                                        <span class="visually-hidden">Đang xử lý...</span>
                                    </div>
                                </button>
                            </div>
                        </form>

                        <div id="alertArea" class="mt-4"></div>

                    </div>
                </div>
            </div>
        </div>

        <div class="row footer">
            <div class="col-12 text-center">
                <p>&copy; 2026 - Ban Tổ chức - Kiểm tra</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            
            const fileInput = document.getElementById('excelFile');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('loadingSpinner');
            const alertArea = document.getElementById('alertArea');
            
            if (fileInput.files.length === 0) return;

            // Xóa thông báo cũ
            alertArea.innerHTML = '';

            // Đóng gói file
            const formData = new FormData();
            formData.append('file_excel', fileInput.files[0]);

            // Trạng thái Loading
            submitBtn.disabled = true;
            btnText.innerHTML = 'Đang xử lý dữ liệu...';
            spinner.style.display = 'inline-block';

            try {
                // Gửi request tới Backend FastAPI
                const response = await fetch('/api/xuat-nhan-xet', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    // Xử lý file Word tải về
                    const blob = await response.blob();
                    const downloadUrl = window.URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = downloadUrl;
                    a.download = `Ban_Nhan_Xet_Tong_Hop_${new Date().getTime()}.docx`;
                    document.body.appendChild(a);
                    a.click();
                    
                    window.URL.revokeObjectURL(downloadUrl);
                    
                    // Hiển thị thông báo thành công
                    alertArea.innerHTML = `
                        <div class="alert alert-success alert-dismissible fade show border-0" role="alert">
                            <i class="bi bi-check-circle-fill me-2"></i>Đã kết xuất thành công! File Word đang được tải xuống.
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    `;
                } else {
                    const errorData = await response.json();
                    alertArea.innerHTML = `
                        <div class="alert alert-danger alert-dismissible fade show border-0" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>Lỗi từ hệ thống: ${errorData.error || 'Không thể xử lý file.'}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Lỗi kết nối:', error);
                alertArea.innerHTML = `
                    <div class="alert alert-danger alert-dismissible fade show border-0" role="alert">
                        <i class="bi bi-x-circle-fill me-2"></i>Không thể kết nối đến máy chủ. Vui lòng kiểm tra lại mạng.
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                `;
            } finally {
                // Khôi phục trạng thái nút bấm
                submitBtn.disabled = false;
                btnText.innerHTML = '<i class="bi bi-gear-fill me-2"></i>Xử lý & Kết xuất File Word';
                spinner.style.display = 'none';
                fileInput.value = ''; 
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
