<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tra cứu Thông tin Sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5" style="max-width: 800px;">
        <a href="index.html" class="btn btn-outline-secondary mb-3">&larr; Quay lại Dashboard</a>
        
        <div class="card shadow-sm border-0 p-4 mb-4 bg-white">
            <h5 class="fw-bold text-secondary"><i class="bi bi-cloud-upload"></i> Dành cho Quản trị viên: Cập nhật Danh sách</h5>
            <form action="/api/upload-excel" method="POST" enctype="multipart/form-data" class="row g-3 align-items-center mt-1">
                <div class="col-auto flex-grow-1">
                    <input type="file" name="fileExcel" class="form-control" accept=".xlsx, .xls" required>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-dark">Tải lên danh sách (.xlsx)</button>
                </div>
            </form>
        </div>

        <div class="card shadow border-0 p-4">
            <h3 class="text-info fw-bold text-center mb-4 text-white bg-info p-2 rounded">CÔNG CỤ TRA CỨU SỐ TÀI KHOẢN & MSSV</h3>
            
            <div class="input-group mb-4 input-group-lg">
                <input type="text" id="inputMssv" class="form-control" placeholder="Nhập Mã số sinh viên để tra cứu...">
                <button class="btn btn-info text-white fw-bold" onclick="handleSearch()">Tìm kiếm</button>
            </div>

            <div id="ketQuaTraCuu" class="d-none alert">
                </div>
        </div>
    </div>

    <script>
        async function handleSearch() {
            const mssv = document.getElementById('inputMssv').value.trim();
            const boxKetQua = document.getElementById('ketQuaTraCuu');
            
            if(!mssv) {
                alert("Vui lòng nhập MSSV!");
                return;
            }

            try {
                const response = await fetch(`/api/tra-cuu?mssv=${mssv}`);
                const resData = await response.json();

                boxKetQua.classList.remove('d-none', 'alert-success', 'alert-danger');

                if (resData.success) {
                    boxKetQua.classList.add('alert-success');
                    boxKetQua.innerHTML = `
                        <h5 class="fw-bold text-success border-bottom pb-2">Thông tin tìm thấy:</h5>
                        <p class="mb-1"><strong>Họ và tên:</strong> ${resData.data.HoTen}</p>
                        <p class="mb-1"><strong>MSSV:</strong> ${resData.data.MSSV}</p>
                        <p class="mb-1"><strong>Số tài khoản:</strong> ${resData.data.STK}</p>
                        <p class="mb-0"><strong>Ngân hàng:</strong> ${resData.data.NganHang}</p>
                    `;
                } else {
                    boxKetQua.classList.add('alert-danger');
                    boxKetQua.innerHTML = `<strong>Thất bại:</strong> ${resData.message}`;
                }
            } catch (error) {
                console.error("Lỗi kết nối API:", error);
                alert("Không thể kết nối đến máy chủ.");
            }
        }
    </script>
</body>
</html>
